name: Bug
description: Report incorrect behavior
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: requirement
    attributes:
      label: Requirement ID (if known)
      placeholder: REQ-01 or N/A
    validations:
      required: true
